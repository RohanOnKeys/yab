name: tabular_classifier

version: 1.0.0

supports:
  - full
  - partial
  - raw

task:
  domain: tabular
  type: classification

parameters:

  input_features:
    type: int
    required: true

  num_classes:
    type: int
    required: true

  hidden_dims:
    type: list
    default:
      - 128
      - 64

  dropout:
    type: float
    default: 0.3

  batch_size:
    type: int
    default: 64

  epochs:
    type: int
    default: 100

  lr:
    type: float
    default: 0.001

  optimizer:
    type: str
    default: adam

  scheduler:
    type: str
    default: null

  weight_decay:
    type: float
    default: 0.0

  loss_fn:
    type: str
    default: cross_entropy

  metrics:
    type: list
    default:
      - accuracy

  checkpoint_dir:
    type: str
    default: checkpoints

  save_best:
    type: bool
    default: true

  device:
    type: str
    default: auto

  seed:
    type: int
    default: 42